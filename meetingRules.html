        <label class="textStuff">Club Meetings;</label>
        <div class="divStuff" style="font-size: larger;">
            <label class="textStuff">Club meetings will take place at least once a month unless grave complications occur.
Club meetings consist of watching a movie (which will have been voted on by club members) and then having a socratic seminar style discussion about that movie. Food will be provided but all club members will pitch in for the food. Even if you don't want to eat you are still required to provide some sort of assistance towards paying. If a club member decides to not to pay the fee they will not be allowed to attend that meeting. If too many meetings are missed then debate of that individual's removal may occur. If voting takes place during a meeting and results in a tie then the founding members' votes will be counted as 2. If a tie still arises then a coin will be flipped in person once to determine the result.
</label>
